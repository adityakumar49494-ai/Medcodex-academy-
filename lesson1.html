<!DOCTYPE html>
<html>
<head>
  <title>Level 1 - Interactive Coding Training</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .option-btn {
      display: block;
      margin: 8px 0;
      padding: 10px;
      background: #f0f4ff;
      border: 1px solid #4a6cf7;
      cursor: pointer;
      border-radius: 6px;
    }

    .option-btn:hover {
      background: #dbe4ff;
    }

    .feedback {
      margin-top: 10px;
      font-weight: bold;
    }

    .level-box {
      background: #eef2ff;
      padding: 15px;
      border-radius: 8px;
      margin-bottom: 20px;
    }

    .progress-bar-container {
      width: 100%;
      background: #ddd;
      border-radius: 20px;
      height: 20px;
      margin-top: 10px;
    }

    .progress-bar {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #4a6cf7, #7b8cff);
      border-radius: 20px;
      transition: 0.4s;
    }
  </style>
</head>
<body>

<div class="container" style="margin-top:40px;">

  <h2>🎮 Level 1: Medical Coding Rookie</h2>

  <div class="level-box">
    <p><strong>XP:</strong> <span id="xp">0</span></p>
    <p><strong>Level:</strong> <span id="level">Beginner Coder</span></p>

    <div class="progress-bar-container">
      <div id="progressBar" class="progress-bar"></div>
    </div>
  </div>

  <div class="card">
    <h3>Case 1</h3>
    <p>Doctor documents Type 2 Diabetes. Which coding system first?</p>

    <button class="option-btn" onclick="answer(true)">ICD-10</button>
    <button class="option-btn" onclick="answer(false)">CPT</button>

    <div id="feedback" class="feedback"></div>
  </div>

  <br>

  <div class="card">
    <h3>Case 2</h3>
    <p>Patient comes for office visit. Which system reports procedure?</p>

    <button class="option-btn" onclick="answer(true)">CPT</button>
    <button class="option-btn" onclick="answer(false)">ICD-10</button>
  </div>

  <br>

  <div class="card" style="text-align:center;">
    <button onclick="completeLesson()" class="btn">
      🚀 Finish Level
    </button>
  </div>

</div>

<script>
let xp = parseInt(localStorage.getItem("xp")) || 0;

function updateUI() {
  document.getElementById("xp").innerText = xp;

  let levelText = "Beginner Coder";

  if (xp >= 100) {
    levelText = "Certified Coder 🏆";
  } else if (xp >= 50) {
    levelText = "Junior Coder 🔵";
  }

  document.getElementById("level").innerText = levelText;

  let progress = Math.min((xp / 100) * 100, 100);
  document.getElementById("progressBar").style.width = progress + "%";
}

function answer(correct) {
  if (correct) {
    xp += 10;
    localStorage.setItem("xp", xp);
    document.getElementById("feedback").innerHTML = "✅ +10 XP!";
  } else {
    document.getElementById("feedback").innerHTML = "❌ Try again.";
  }

  updateUI();
}

function completeLesson() {
  localStorage.setItem("lesson1", "done");
  alert("Level Completed! 🎉");
}

updateUI();
</script>

</body>
</html>
