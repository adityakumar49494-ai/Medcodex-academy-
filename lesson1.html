<!DOCTYPE html>
<html>
<head>
  <title>Lesson 1 - CodeMed Academy</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f5f7fb;
      padding: 20px;
      max-width: 720px;
      margin: auto;
    }

    h2 { text-align: center; }

    .card {
      background: white;
      padding: 18px;
      border-radius: 12px;
      margin-bottom: 18px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.05);
    }

    .xp-box {
      background: white;
      padding: 14px;
      border-radius: 12px;
      margin-bottom: 10px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.05);
    }

    .progress-container {
      background: #ddd;
      height: 14px;
      border-radius: 20px;
      overflow: hidden;
      margin-top: 8px;
    }

    .progress-bar {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #58cc02, #46a302);
      transition: 0.4s;
    }

    .option-btn {
      display: block;
      width: 100%;
      padding: 10px;
      margin: 8px 0;
      border: none;
      border-radius: 8px;
      background: #e5edff;
      cursor: pointer;
      font-weight: bold;
    }

    .option-btn:hover {
      background: #d2dcff;
    }

    .feedback {
      margin-top: 10px;
      font-weight: bold;
    }

    .badge {
      display: inline-block;
      background: gold;
      padding: 6px 12px;
      border-radius: 20px;
      font-weight: bold;
      margin-top: 10px;
    }

    .lives {
      color: red;
      font-size: 20px;
    }

    .confetti {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: repeating-linear-gradient(
        45deg,
        #ff0,
        #ff0 10px,
        #f0f 10px,
        #f0f 20px
      );
      opacity: 0.3;
      animation: fadeOut 2s forwards;
    }

    @keyframes fadeOut {
      to { opacity: 0; }
    }

    .locked {
      opacity: 0.5;
      pointer-events: none;
    }

    .btn-link {
      display: inline-block;
      padding: 10px 15px;
      background: #4a6cf7;
      color: white;
      text-decoration: none;
      border-radius: 8px;
      margin-top: 10px;
    }
  </style>
</head>

<body>

<h2>🏥 Lesson 1: Introduction to Medical Coding</h2>

<div class="xp-box">
  XP: <strong><span id="xp">0</span></strong>
  <div class="progress-container">
    <div id="progressBar" class="progress-bar"></div>
  </div>
</div>

<div class="xp-box">
  🔥 Streak: <strong><span id="streak">0</span></strong> days
</div>

<div class="xp-box">
  ❤️ Lives: <span id="lives" class="lives">❤️❤️❤️</span>
</div>

<div class="card">
  <h3>Quick Learn</h3>
  <p>Medical coding translates medical documentation into standardized codes.</p>
</div>

<div class="card">
  <h3>Practice Question</h3>
  <p>Which coding system is used for diagnosis?</p>

  <button class="option-btn" onclick="check(true)">ICD-10</button>
  <button class="option-btn" onclick="check(false)">CPT</button>

  <div id="feedback" class="feedback"></div>
</div>

<div class="card">
  <h3>🏆 Badges</h3>
  <div id="badgeArea"></div>
</div>

<div class="card">
  <h3>Next Lesson</h3>
  <a id="lesson2Btn" href="lesson2.html" class="btn-link locked">
    🔒 Unlock at 30 XP
  </a>
</div>

<script>
let xp = parseInt(localStorage.getItem("xp")) || 0;
let streak = parseInt(localStorage.getItem("streak")) || 0;
let lives = parseInt(localStorage.getItem("lives")) || 3;
let lastVisit = localStorage.getItem("lastVisit");

function updateUI() {
  document.getElementById("xp").innerText = xp;
  document.getElementById("streak").innerText = streak;

  document.getElementById("lives").innerText = "❤️".repeat(lives);

  let progress = Math.min((xp / 100) * 100, 100);
  document.getElementById("progressBar").style.width = progress + "%";

  if (xp >= 30) {
    document.getElementById("lesson2Btn").classList.remove("locked");
    document.getElementById("lesson2Btn").innerText = "Go to Lesson 2";
  }

  if (xp >= 50) {
    document.getElementById("badgeArea").innerHTML =
      '<div class="badge">🏆 Coding Rookie Badge</div>';
  }
}

function showConfetti() {
  const confetti = document.createElement("div");
  confetti.className = "confetti";
  document.body.appendChild(confetti);
  setTimeout(() => confetti.remove(), 2000);
}

function check(correct) {
  if (lives <= 0) return;

  if (correct) {
    xp += 10;
    document.getElementById("feedback").innerHTML = "✅ Correct! +10 XP";
    showConfetti();
  } else {
    lives--;
    document.getElementById("feedback").innerHTML = "❌ Wrong! Lost 1 life";
  }

  localStorage.setItem("xp", xp);
  localStorage.setItem("lives", lives);
  updateUI();
}

function updateStreak() {
  const today = new Date().toDateString();

  if (!lastVisit) {
    streak = 1;
  } else {
    const lastDate = new Date(lastVisit);
    const currentDate = new Date(today);
    const diffDays = (currentDate - lastDate) / (1000 * 60 * 60 * 24);

    if (diffDays === 1) streak++;
    else if (diffDays > 1) streak = 1;
  }

  localStorage.setItem("streak", streak);
  localStorage.setItem("lastVisit", today);
}

updateStreak();
updateUI();
</script>

</body>
</html>
